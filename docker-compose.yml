services:
  morning-news:
    build: .
    container_name: morning-news
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # SQLite 数据库 + 缓存持久化（容器删除后数据不丢）
      - ./data:/app/data
      # 配置文件（如需修改 config 在线生效）
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  # 定时刷新由 morning-news 服务内置 _auto_refresh_loop 负责，默认 06:00-18:00 每 2 小时一次。
  # Docker 部署不再启动 cron_scraper.py --loop 或额外 sidecar，避免重复抓取。
