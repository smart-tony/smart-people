services:
  morning-news:
    build: .
    container_name: morning-news
    restart: unless-stopped
    ports:
      # 宿主机沿用之前的 8010，容器内部仍然是 8000
      - "8010:8000"
    volumes:
      # SQLite 数据库 + 缓存持久化（容器删除后数据不丢）
      - ./data:/app/data
      # 配置文件（如需修改 config 在线生效）
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - PORT=8000

      # 定时刷新：北京时间每天 08:30 / 10:00 / 14:00 三档，晚上不抓
      - LOGISTICS_AUTO_REFRESH_TZ=Asia/Shanghai
      - LOGISTICS_AUTO_REFRESH_TIMES=08:30,10:00,14:00
      - LOGISTICS_STALE_TRIGGER_SECONDS=14400
      - LOGISTICS_HEALTH_MAX_AGE_SECONDS=72000

      # 正文处理：trafilatura 提取正文，超长正文再交给 LLM 精炼
      - CLEAN_WITH_LLM=false
      - COMPACT_LONG_BODY_WITH_LLM=true
      - COMPACT_LONG_BODY_MIN_CHARS=1800
      - COMPACT_LONG_BODY_MAX_INPUT_CHARS=5000
      - COMPACT_LONG_BODY_MAX_ITEMS=8

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=8).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 定时刷新由 morning-news 服务内置 _auto_refresh_loop 负责：北京时间 08:30/10:00/14:00。
  # Docker 部署不再启动 cron_scraper.py --loop 或额外 sidecar，避免重复抓取。