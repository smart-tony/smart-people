services:
  morning-news:
    build: .
    container_name: morning-news
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # SQLite 数据库 + 缓存持久化（容器删除后数据不丢）
      - ./data:/app/data
      # 配置文件（如需修改 config 在线生效）
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

